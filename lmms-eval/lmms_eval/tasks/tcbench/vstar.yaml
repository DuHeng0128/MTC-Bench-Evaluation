dataset_path: /root/TCBench/image/Specific_Capabilities/High_rate_Compression/Vstar
dataset_kwargs:
  token: True
  local_files_only: True
  ignore_verifications: True
  cache_dir: vstar
metadata:
  version: 0.0.1
  load_package: True
task: "vstar_test_tcbench"
test_split: test
group: tcbench_image
output_type: generate_until

doc_to_visual: !function utils.vstar_doc_to_visual
doc_to_text: !function utils.vstar_doc_to_text
doc_to_target: "label"

process_results: !function utils.vstar_process_results

metric_list:
  - metric: exact_match
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer with the correct label or short phrase."
