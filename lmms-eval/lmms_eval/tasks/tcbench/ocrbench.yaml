dataset_path: /root/TCBench/image/Specific_Capabilities/Fine_grained_Vision_Coverage/OCRBench-v2
dataset_kwargs:
  token: True
  local_files_only: True
  ignore_verifications: True
task: "ocrbench_tcbench"
test_split: test
output_type: generate_until
group: tcbench_image
doc_to_visual: !function utils.ocrbench_doc_to_visual
doc_to_text: !function utils.ocrbench_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 128
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.ocrbench_process_results
metric_list:
  - metric: ocrbench_accuracy
    aggregation: !function utils.ocrbench_aggregate_accuracy
    higher_is_better: true
metadata:
  - version: 0.0