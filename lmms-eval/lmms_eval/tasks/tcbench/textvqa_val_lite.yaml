task: textvqa_val_lite_tcbench
test_split: train
group: tcbench_lite
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
  - metric: submission
    aggregation: !function utils.textvqa_aggregate_submissions
    higher_is_better: true
dataset_path: /root/TCBench/image/Specific_Capabilities/Fine_grained_Vision_Coverage/textvqa_val
dataset_kwargs:
  token: True
  local_files_only: True
  ignore_verifications: True
output_type: generate_until
doc_to_visual: !function utils.textvqa_doc_to_visual
doc_to_text: !function utils.textvqa_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  until:
    - "ASSISTANT:"
process_results: !function utils.textvqa_process_results
lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer the question using a single word or phrase."
    ocr: false
  qwen_vl:
    pre_prompt: ""
    post_prompt: " Answer:"

