dataset_path: /root/TCBench/video/General_Multimodal_Capbility/NExTQA
dataset_kwargs:
  token: True
  local_files_only: True
  ignore_verifications: True
  cache_dir: nextqa
metadata:
  version: 0.0.1
  load_package: True
task: "nextqa_mc_test_tcbench"
dataset_name: MC
test_split: test
group: tcbench
output_type: generate_until
doc_to_visual: !function utils.nextqa_doc_to_visual
doc_to_text: !function utils.nextqa_doc_to_text_mc
doc_to_target: !function utils.nextqa_doc_to_target
process_results: !function utils.nextqa_mc_process_results
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
