dataset_path: /root/data2/lisida/MTC-Bench-Data/video/Specific_Capabilities/Complex_Crossmodal_Alignment/VideoMMMU
dataset_kwargs:
  token: True
  local_files_only: True
  #ignore_verifications: True
  verification_mode: "no_checks"
lmms_eval_specific_kwargs:
  default:
    pre_prompt: "You should watch and learn the video content. Then apply what you learned to "
    perception_and_comprehension_prompt: "\nPlease ignore the Quiz question in last frame of the video."
    mcq_prompt: "answer the following multi-choice question. The image for this question is at the end of the video.\n"
    open_ended_prompt: "answer the following open-ended question. The image for this question is at the end of the video.\n"
generation_kwargs:
  max_new_tokens: 1024
dataset_name: "Adaptation"
group: mtcbench_video
task: "video_mmmu_adaptation_mtcbench"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.videommmu_doc_to_visual
doc_to_text: !function utils.videommmu_doc_to_text_adaptation
doc_to_target: !function utils.videommmu_doc_to_answer
process_results: !function utils.videommmu_process_results
metric_list:
  - metric: mmmu_acc
    aggregation: !function utils.videommmu_aggregate_results
    higher_is_better: true