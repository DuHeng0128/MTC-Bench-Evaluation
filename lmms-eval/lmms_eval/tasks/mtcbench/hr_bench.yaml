metadata:
  version: 0.0
  gpt_eval_model_name: "gpt-3.5-turbo"
  max_workers: 1

dataset_path: /root/data2/lisida/MTC-Bench-Data/image/Specific_Capabilities/High_rate_Compression/HR-Bench/
dataset_kwargs:
  token: True
  local_files_only: True
  verification_mode: "no_checks"
  data_files:
    test: "test-00000-of-00001.parquet"

task: "hr_bench_test_mtcbench"
test_split: test
group: mtcbench_image
output_type: generate_until

doc_to_visual: !function utils.hrbench_doc_to_visual
doc_to_text: !function utils.hrbench_doc_to_text
doc_to_target: "answer"
# The return value of process_results will be used by metrics
process_results: !function utils.hrbench_process_results
# Note that the metric name can be either a registed metric function (such as the case for GQA) or a key name returned by process_results
metric_list:
  - metric: single
    aggregation: !function utils.hrbench_aggregate_results
    higher_is_better: true
  - metric: cross
    aggregation: !function utils.hrbench_aggregate_results
    higher_is_better: true
  - metric: average
    aggregation: !function utils.hrbench_aggregate_results
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    pre_prompt: ""
    post_prompt: "\nAnswer with the correct label or short phrase."
