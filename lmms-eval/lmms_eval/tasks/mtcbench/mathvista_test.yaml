dataset_path: /root/data2/lisida/MTC-Bench-Data/image/Specific_Capabilities/Reasoning_or_Math/MathVista/data
dataset_kwargs:
  token: True
  local_files_only: True
  verification_mode: "no_checks"
task: "mathvista_test_mtcbench"
test_split: test
output_type: generate_until
doc_to_visual: !function utils.mathvista_doc_to_visual
doc_to_text: !function utils.mathvista_doc_to_text
doc_to_target: "answer"
generation_kwargs:
  max_new_tokens: 1024
  temperature: 0
  top_p: 1.0
  num_beams: 1
  do_sample: false
process_results: !function utils.mathvista_process_results
metric_list:
  - metric: submission
    aggregation: !function utils.mathvista_aggregate_results
    higher_is_better: true

lmms_eval_specific_kwargs:
  default:
    shot_type: "reason-first" # can be "reason-first", "solution", "step-by-step"

metadata:
  version: 0.0
  gpt_eval_model_name: "gpt-3.5-turbo"
  quick_extract: false